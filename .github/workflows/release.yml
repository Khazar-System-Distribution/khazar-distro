# Build KhazarOS bootc container and publish to GitHub Container Registry
# Full distro image. Users convert to ISO locally with one script.

name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build-container:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make podman qemu-user-static

      - name: Build SDK + all components
        run: |
          make all
          make -C sdk test

      - name: Build bootc container image
        run: |
          podman build \
            --tag khazaros:${GITHUB_REF_NAME#v} \
            --tag ghcr.io/khazar-system-distribution/khazaros:${GITHUB_REF_NAME#v} \
            --tag ghcr.io/khazar-system-distribution/khazaros:latest \
            -f distro/bootc/Containerfile \
            .

      - name: Push to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u ${{ github.actor }} --password-stdin
          podman push ghcr.io/khazar-system-distribution/khazaros:${GITHUB_REF_NAME#v}
          podman push ghcr.io/khazar-system-distribution/khazaros:latest

      - name: Export as tarball
        run: |
          podman save khazaros:${GITHUB_REF_NAME#v} | \
            gzip > khazaros-${GITHUB_REF_NAME#v}-x86_64.tar.gz
          ls -lah khazaros-*.tar.gz

      - name: Create ISO-conversion script
        run: |
          cat > build-iso.sh << 'SCRIPT'
          #!/bin/bash
          # Convert KhazarOS container to bootable disk image
          # Usage: bash build-iso.sh [version]
          set -e
          V="${1:-latest}"
          IMG="khazaros-${V}-x86_64"

          echo "=== KhazarOS ISO Builder ==="

          # Load container
          if [ -f "khazaros-${V}-x86_64.tar.gz" ]; then
              echo "[1/3] Loading container..."
              podman load -i "khazaros-${V}-x86_64.tar.gz"
          else
              echo "[1/3] Pulling from ghcr.io..."
              podman pull "ghcr.io/khazar-system-distribution/khazaros:${V}"
          fi

          # Build disk image with bootc-image-builder
          echo "[2/3] Building bootable disk (this takes ~5 minutes)..."
          mkdir -p output

          if command -v bootc-image-builder &>/dev/null; then
              bootc-image-builder \
                  --type qcow2 \
                  --rootfs xfs \
                  "ghcr.io/khazar-system-distribution/khazaros:${V}" \
                  "output/${IMG}.qcow2"
          else
              echo "bootc-image-builder not found. Install it:"
              echo "  pip install bootc-image-builder"
              echo ""
              echo "Or use bootc directly (requires writing to a disk):"
              echo "  podman run --rm --privileged -v /dev/sdX:/dev/sdX \\"
              echo "    ghcr.io/khazar-system-distribution/khazaros:${V} \\"
              echo "    bootc install /dev/sdX"
              exit 1
          fi

          # Convert to raw (dd-able to USB)
          echo "[3/3] Converting to raw..."
          if [ -f "output/${IMG}.qcow2" ]; then
              qemu-img convert -f qcow2 -O raw \
                  "output/${IMG}.qcow2" "output/${IMG}.raw"
              echo "  [+] output/${IMG}.raw — Write to USB with dd"
              echo "  [+] output/${IMG}.qcow2 — Use in QEMU/VirtualBox"
          fi

          echo ""
          echo "=== Done ==="
          echo "USB:  sudo dd if=output/${IMG}.raw of=/dev/sdX bs=4M status=progress"
          echo "QEMU: qemu-system-x86_64 -m 4096 -enable-kvm -hda output/${IMG}.qcow2"
          SCRIPT
          chmod +x build-iso.sh

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: KhazarOS ${{ github.ref_name }}
          body: |
            ## KhazarOS ${{ github.ref_name }}

            AI-powered Linux desktop based on Fedora Silverblue 40.

            ### What's included
            - Fedora Silverblue 40 base (immutable, atomic updates)
            - GNOME 46 with Khazar Dark theme
            - Khazar AI platform (11 daemon services)
            - 5 AI agents (desktop, package, network, power, audio)

            ### Download
            - `khazaros-${{ github.ref_name }}-x86_64.tar.gz` — Container image (3+ GB)
            - `build-iso.sh` — Script to convert container to bootable disk image

            ### Quick Start
            ```bash
            # Download + extract
            wget https://github.com/Khazar-System-Distribution/khazar-distro/releases/download/${{ github.ref_name }}/khazaros-${{ github.ref_name }}-x86_64.tar.gz
            wget https://github.com/Khazar-System-Distribution/khazar-distro/releases/download/${{ github.ref_name }}/build-iso.sh

            # Convert to bootable disk (requires ~10GB free)
            bash build-iso.sh ${{ github.ref_name }}
            # Produces: output/khazaros-${{ github.ref_name }}-x86_64.raw

            # Write to USB
            sudo dd if=output/khazaros-${{ github.ref_name }}-x86_64.raw of=/dev/sdX bs=4M status=progress

            # Or test in QEMU
            qemu-system-x86_64 -m 4096 -enable-kvm -hda output/khazaros-${{ github.ref_name }}-x86_64.qcow2
            ```

            ### Pull from Container Registry
            ```bash
            podman pull ghcr.io/khazar-system-distribution/khazaros:${{ github.ref_name }}
            # Or: podman pull ghcr.io/khazar-system-distribution/khazaros:latest
            ```

            See [README.md](README.md) and [TESTING.md](TESTING.md) for full documentation.
          files: |
            khazaros-${{ github.ref_name }}-x86_64.tar.gz
            build-iso.sh
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
