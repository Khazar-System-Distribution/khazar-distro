name: Build KhazarOS ISO (Universal Blue)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-distro:
    name: Build KhazarOS
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h /

      - name: Build Khazar platform
        run: |
          sudo apt-get update && sudo apt-get install -y gcc make
          make sdk
          make -C sdk test
          make all

      - name: Copy binaries to system overlay
        run: |
          mkdir -p system/usr/local/bin system/etc/khazar/policies system/usr/lib
          for comp in orchestrator rule-engine policy-engine model-runtime intent-classifier; do
            cp components/$comp/ai-$comp system/usr/local/bin/ 2>/dev/null || true
          done
          for agent in desktop package network power audio; do
            cp agents/${agent}-agent/ai-${agent}-agent system/usr/local/bin/ 2>/dev/null || true
          done
          cp sdk/libai-sdk.a system/usr/lib/ 2>/dev/null || true

      - name: Build container image
        uses: ublue-os/builder@v1
        with:
          image_name: khazaros
          image_tag: latest
          push_to_registry: true
          registry: ghcr.io
          registry_user: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate ISO
        run: |
          pip install bootc-image-builder
          sudo ~/.local/bin/bootc-image-builder \
            --type anaconda-iso \
            ghcr.io/${{ github.repository_owner }}/khazaros:latest \
            khazaros-latest-x86_64.iso

      - name: Checksum
        run: sha256sum khazaros-latest-x86_64.iso > khazaros-latest-x86_64.iso.sha256

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: khazaros-iso
          path: |
            khazaros-latest-x86_64.iso
            khazaros-latest-x86_64.iso.sha256

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: KhazarOS ${{ github.ref_name }}
          files: |
            khazaros-latest-x86_64.iso
            khazaros-latest-x86_64.iso.sha256
          body: |
            ## KhazarOS ${{ github.ref_name }}

            Complete Fedora Silverblue-based distro with Khazar AI.

            ### Download
            - `khazaros-latest-x86_64.iso` — Bootable installer ISO

            ### Install
            ```bash
            sudo dd if=khazaros-latest-x86_64.iso of=/dev/sdX bs=4M status=progress
            ```

            ### Test in QEMU
            ```bash
            qemu-system-x86_64 -m 4096 -enable-kvm -hda khazaros-latest-x86_64.iso
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
