name: Build KhazarOS (Universal Blue)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'  # Weekly rebuild
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Maximize build space
        uses: easimon/maximize-build-space@v1
        with:
          root-reserve-mb: 4096
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make podman qemu-user-static

      - name: Build Khazar binaries
        run: |
          make sdk
          make -C sdk test
          make all

      - name: Copy binaries to staging
        run: |
          mkdir -p staging/usr/local/bin staging/etc/khazar/policies staging/usr/lib
          for comp in orchestrator rule-engine policy-engine model-runtime intent-classifier; do
            bin="ai-$comp"
            [ -f "components/$comp/$bin" ] && cp "components/$comp/$bin" staging/usr/local/bin/
          done
          for agent in desktop package network power audio; do
            b="ai-${agent}-agent"
            [ -f "agents/${agent}-agent/$b" ] && cp "agents/${agent}-agent/$b" staging/usr/local/bin/
          done
          cp sdk/libai-sdk.a staging/usr/lib/ 2>/dev/null || true
          cp distro/cli/kha staging/usr/local/bin/
          cp distro/configs/*.toml staging/etc/khazar/ 2>/dev/null || true
          cp distro/configs/default.policy.toml staging/etc/khazar/policies/ 2>/dev/null || true
          chmod +x staging/usr/local/bin/*

      - name: Build OCI container image
        run: |
          podman build \
            --tag khazaros:latest \
            -f distro/bootc/Containerfile \
            .

      - name: Install bootc-image-builder
        run: pip install --user bootc-image-builder

      - name: Build bootable ISO disk image
        run: |
          mkdir -p output
          sudo -E ~/.local/bin/bootc-image-builder \
            --type qcow2 \
            --rootfs xfs \
            --local localhost/khazaros:latest \
            output/khazaros.qcow2

          # Convert qcow2 to raw (dd-able to USB)
          qemu-img convert -f qcow2 -O raw \
            output/khazaros.qcow2 output/khazaros.raw

          ls -lah output/

      - name: Generate checksums
        run: |
          cd output
          sha256sum khazaros.raw khazaros.qcow2 > SHA256SUMS
          cat SHA256SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: khazaros-disk-images
          path: |
            output/khazaros.raw
            output/khazaros.qcow2
            output/SHA256SUMS

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          name: KhazarOS ${{ github.ref_name }}
          body: |
            ## KhazarOS ${{ github.ref_name }}

            Complete bootable disk image. Fedora Silverblue + Khazar AI.

            ### Downloads
            - `khazaros.raw` — Raw disk image (write to USB with dd)
            - `khazaros.qcow2` — QEMU/VirtualBox image

            ### Quick Start
            ```bash
            # USB install
            sudo dd if=khazaros.raw of=/dev/sdX bs=4M status=progress

            # QEMU test
            qemu-system-x86_64 -m 4096 -enable-kvm -hda khazaros.qcow2

            # VirtualBox
            qemu-img convert -f qcow2 -O vdi khazaros.qcow2 khazaros.vdi
            ```
          files: |
            output/khazaros.raw
            output/khazaros.qcow2
            output/SHA256SUMS
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
